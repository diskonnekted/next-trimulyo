<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradien hijau emerald untuk background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <!-- Gradien untuk huruf P - putih dengan sedikit transparansi -->
    <linearGradient id="pGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0FDF4;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- Decorative circles - community elements -->
  <g opacity="0.1" fill="#FFFFFF">
    <circle cx="100" cy="120" r="40"/>
    <circle cx="412" cy="140" r="30"/>
    <circle cx="420" cy="380" r="45"/>
    <circle cx="95" cy="400" r="35"/>
    <circle cx="256" cy="80" r="25"/>
  </g>

  <!-- Huruf P yang stylized dan menyatu -->
  <g filter="url(#shadow)">
    <!-- P dibuat dari satu path yang menyatu -->
    <path d="
      M 180 140
      C 180 140, 180 120, 200 120
      L 280 120
      C 340 120, 380 160, 380 220
      C 380 280, 340 320, 280 320
      L 240 320
      L 240 420
      C 240 420, 240 440, 220 440
      C 200 440, 180 440, 180 420
      L 180 140
      Z
      M 240 180
      L 240 260
      L 280 260
      C 310 260, 330 240, 330 220
      C 330 200, 310 180, 280 180
      L 240 180
      Z
    "
    fill="url(#pGradient)"
    filter="url(#glow)"/>

    <!-- Accent decorative element -->
    <circle cx="360" cy="220" r="8" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="200" cy="160" r="6" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Decorative dots pattern di bawah -->
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="220" cy="470" r="4"/>
    <circle cx="240" cy="475" r="3"/>
    <circle cx="260" cy="477" r="4"/>
    <circle cx="280" cy="475" r="3"/>
    <circle cx="300" cy="470" r="4"/>
  </g>
</svg>